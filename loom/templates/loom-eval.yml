name: loom eval

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run loom eval
        run: uv run python -m loom.cli eval --fail-under {{FAIL_UNDER}}

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loom-eval-report
          path: loom-eval-report.html
          retention-days: 14
          if-no-files-found: ignore