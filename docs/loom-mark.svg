<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <title>loom</title>
  <desc>Weaving apparatus: five warp threads interlaced with five weft threads, with a shuttle at the advancing edge.</desc>

  <!-- Implied frame (subtle vertical beams) -->
  <line x1="20" y1="20" x2="20" y2="180" stroke="#5b8a72" stroke-width="0.5" opacity="0.15"/>
  <line x1="180" y1="20" x2="180" y2="180" stroke="#5b8a72" stroke-width="0.5" opacity="0.15"/>

  <!-- Warp threads (vertical, background layer) -->
  <!-- x = 40, 65, 90, 115, 140 — spacing 25 -->
  <line x1="40" y1="20" x2="40" y2="180" stroke="#5b8a72" stroke-width="1.3" opacity="0.38"/>
  <line x1="65" y1="20" x2="65" y2="180" stroke="#5b8a72" stroke-width="1.5" opacity="0.38"/>
  <line x1="90" y1="20" x2="92" y2="180" stroke="#5b8a72" stroke-width="1.8" opacity="0.38"/>
  <line x1="115" y1="20" x2="115" y2="180" stroke="#5b8a72" stroke-width="1.5" opacity="0.38"/>
  <line x1="140" y1="20" x2="140" y2="180" stroke="#5b8a72" stroke-width="1.3" opacity="0.38"/>

  <!-- Weft threads (horizontal, foreground layer) — plain weave gaps -->
  <!-- Weft 1 y=40: OVER 1,3,5  UNDER 2,4 -->
  <path d="M20,40 H57 M73,40 H107 M123,40 H180" stroke="#5b8a72" stroke-width="1.5" opacity="0.60" fill="none"/>
  <!-- Weft 2 y=65: UNDER 1,3,5  OVER 2,4 — thinner, tauter -->
  <path d="M20,65 H33 M47,65 H83 M97,65 H133 M147,65 H180" stroke="#5b8a72" stroke-width="1.1" opacity="0.50" fill="none"/>
  <!-- Weft 3 y=90: OVER 1,3,5  UNDER 2,4 — shuttle weft, brightest -->
  <path d="M20,90 H57 M73,90 H107 M123,90 H180" stroke="#5b8a72" stroke-width="1.5" opacity="0.70" fill="none"/>
  <!-- Weft 4 y=115: UNDER 1,3,5  OVER 2,4 — thinner, tauter -->
  <path d="M20,115 H33 M47,115 H83 M97,115 H133 M147,115 H180" stroke="#5b8a72" stroke-width="1.1" opacity="0.50" fill="none"/>
  <!-- Weft 5 y=140: OVER 1,3,5  UNDER 2,4 — extends beyond frame -->
  <path d="M20,140 H57 M73,140 H107 M123,140 H186" stroke="#5b8a72" stroke-width="1.5" opacity="0.60" fill="none"/>

  <!-- Shuttle (elongated diamond at weft 3 advancing edge) -->
  <polygon points="150,90 162,85 174,90 162,95" fill="#5b8a72" opacity="0.82"/>

  <!-- Shed indicator (small dot near shuttle — the moment of weaving) -->
  <circle cx="146" cy="90" r="1.8" fill="#5b8a72" opacity="0.55"/>

  <!-- Extending thread detail (weft 5 trail beyond frame) -->
  <line x1="180" y1="140" x2="190" y2="140" stroke="#5b8a72" stroke-width="0.8" opacity="0.30" stroke-dasharray="2,3"/>
</svg>
